name: release macOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - 'v*'
      - 'V*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      target: macos

  release-zip:
    if: inputs.release_tag != ''
    needs: build
    uses: ./.github/workflows/package-zip.yml
    with:
      target: macos
      release_tag: ${{ inputs.release_tag }}
    
  dmg:
    name: package and release macOS dmg
    if: inputs.release_tag != ''
    needs: build
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: macos-latest
    env:
      Arch: |-
        ${{
          case(
            matrix.arch == 'x64', '64',
            matrix.arch
          ) 
        }} 
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Restore build artifacts
      uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.arch }}
        path: v2rayN-macos-${{ env.Arch }}
    
    # release osx package (run on workflow_dispatch with release_tag OR on tag push)
    - name: Package osx
      if: github.event.inputs.release_tag != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      run: |
        RELEASE_TAG="${{ github.event.inputs.release_tag || github.ref_name }}"
        brew install create-dmg
        chmod 755 package-osx.sh
        ./package-osx.sh $OutputArch $OutputPath64 "$RELEASE_TAG"
        ./package-osx.sh $OutputArchArm $OutputPathArm64 "$RELEASE_TAG"
    
    - name: Upload dmg to release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      with:
        file: ${{ github.workspace }}/v2rayN*.dmg
        tag: ${{ github.event.inputs.release_tag || github.ref_name }}
        file_glob: true
        prerelease: true

    # release zip archive
    - name: Package release zip archive
      if: github.event.inputs.release_tag != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      run: |
        chmod 755 package-release-zip.sh
        ./package-release-zip.sh $OutputArch $OutputPath64
        ./package-release-zip.sh $OutputArchArm $OutputPathArm64
    
    - name: Upload zip archive to release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      with:
        file: ${{ github.workspace }}/v2rayN*.zip
        tag: ${{ github.event.inputs.release_tag || github.ref_name }}
        file_glob: true
        prerelease: true
